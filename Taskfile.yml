# https://taskfile.dev
version: "3"

vars:
  # 项目名称
  PROJECT_NAME: easy-qfnu-empty-classrooms
  # 目标平台
  TARGET_OS: linux
  TARGET_ARCH: amd64
  # 编译产物名称
  BINARY_NAME: "{{.PROJECT_NAME}}-{{.TARGET_OS}}-{{.TARGET_ARCH}}"
  # Supervisor 进程名
  SUPERVISOR_PROGRAM: "easy-qfnu-empty-classrooms:easy-qfnu-empty-classrooms_00"

tasks:
  install:
    desc: 安装所有依赖 (Go + npm)
    cmds:
      - task: install-go
      - task: install-frontend

  install-go:
    desc: 安装 Go 依赖
    cmds:
      - go mod download

  install-frontend:
    desc: 安装前端依赖
    dir: frontend
    preconditions:
      - sh: test -d .
        msg: "未找到 frontend 目录，无法安装前端依赖。"
    cmds:
      - npm install

  default:
    desc: 显示使用说明
    cmds:
      - echo "请使用 'task deploy' 并传入必要参数，示例："
      - echo "  task deploy -- --host 服务器地址 --port 22 --user 用户名 --path /目标目录"

  build-frontend:
    desc: 构建前端产物
    dir: frontend
    preconditions:
      - sh: test -d .
        msg: "未找到 frontend 目录，无法执行前端构建。"
    cmds:
      - npm run build

  compile:
    desc: 交叉编译 Go 二进制文件 (Linux amd64)
    env:
      CGO_ENABLED: "0"
      GOOS: "{{.TARGET_OS}}"
      GOARCH: "{{.TARGET_ARCH}}"
    cmds:
      - go build -ldflags "-s -w" -o {{.BINARY_NAME}} .
    generates:
      - "{{.BINARY_NAME}}"

  deploy:
    desc: "完整部署，示例: task deploy -- --host 1.2.3.4 --port 22 --user root --path /opt/app"
    cmds:
      - task: build-frontend
      - task: compile
      - task: deploy-remote

  deploy-remote:
    desc: 解析参数并执行远程部署 (上传 -> 重启 -> 清理)
    cmds:
      - |
        # 解析 CLI 参数
        DEPLOY_HOST=""
        DEPLOY_PORT="22"
        DEPLOY_USER=""
        DEPLOY_PATH=""

        args=({{.CLI_ARGS}})
        i=0
        while [ $i -lt ${#args[@]} ]; do
          case "${args[$i]}" in
            --host)  i=$((i+1)); DEPLOY_HOST="${args[$i]}" ;;
            --port)  i=$((i+1)); DEPLOY_PORT="${args[$i]}" ;;
            --user)  i=$((i+1)); DEPLOY_USER="${args[$i]}" ;;
            --path)  i=$((i+1)); DEPLOY_PATH="${args[$i]}" ;;
            *)       echo "[!] 未知参数: ${args[$i]}"; exit 1 ;;
          esac
          i=$((i+1))
        done

        # 校验必填参数
        if [ -z "$DEPLOY_HOST" ]; then echo "[!] 缺少 --host 参数"; exit 1; fi
        if [ -z "$DEPLOY_USER" ]; then echo "[!] 缺少 --user 参数"; exit 1; fi
        if [ -z "$DEPLOY_PATH" ]; then echo "[!] 缺少 --path 参数"; exit 1; fi

        SSH_CMD="ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST}"
        BINARY_NAME="{{.BINARY_NAME}}"
        SUPERVISOR_PROGRAM="{{.SUPERVISOR_PROGRAM}}"

        echo "========================================="
        echo "  部署目标: ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PORT}"
        echo "  远程路径: ${DEPLOY_PATH}"
        echo "========================================="

        echo "[-] 停止远程服务..."
        $SSH_CMD "supervisorctl stop $SUPERVISOR_PROGRAM"

        echo "[-] 创建远程目录..."
        $SSH_CMD "mkdir -p $DEPLOY_PATH"

        echo "[-] 上传编译产物..."
        scp -P $DEPLOY_PORT -o StrictHostKeyChecking=no "$BINARY_NAME" "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

        echo "[-] 设置执行权限..."
        $SSH_CMD "chmod +x ${DEPLOY_PATH}/${BINARY_NAME}"

        echo "[-] 启动远程服务..."
        $SSH_CMD "supervisorctl start $SUPERVISOR_PROGRAM"

        echo "[+] 部署完成!"

        echo "[-] 清理本地构建产物..."
        rm -f "$BINARY_NAME"
        echo "[+] 清理完成!"

  clean:
    desc: 清理本地构建产物
    cmds:
      - rm -f {{.BINARY_NAME}}
