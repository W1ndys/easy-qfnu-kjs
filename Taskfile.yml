# https://taskfile.dev
version: "3"

vars:
  # 项目名称
  PROJECT_NAME: easy-qfnu-empty-classrooms
  # 目标平台
  TARGET_OS: linux
  TARGET_ARCH: amd64
  # 编译产物名称
  BINARY_NAME: "{{.PROJECT_NAME}}-{{.TARGET_OS}}-{{.TARGET_ARCH}}"
  # 服务器配置
  SERVER: mylinux
  PORT: 22
  SSH_USER: root
  REMOTE_PATH: /root/easy-qfnu-empty-classrooms
  SUPERVISOR_PROGRAM: "easy-qfnu-empty-classrooms:easy-qfnu-empty-classrooms_00"
  # 手动指定 SSH 密钥路径，留空则由 SSH 自动尝试 ~/.ssh/ 下所有私钥
  IDENTITY_FILE: ""
  # 构建 SSH 密钥参数：指定了 IDENTITY_FILE 则用 -i，否则留空让 SSH 自动选择
  SSH_IDENTITY_FLAG:
    sh: |
      if [ -n "{{.IDENTITY_FILE}}" ] && [ -f "{{.IDENTITY_FILE}}" ]; then
        echo "-i {{.IDENTITY_FILE}}"
      fi

tasks:
  install:
    desc: 安装所有依赖 (Go + npm)
    cmds:
      - task: install-go
      - task: install-frontend

  install-go:
    desc: 安装 Go 依赖
    cmds:
      - go mod download

  install-frontend:
    desc: 安装前端依赖
    dir: frontend
    preconditions:
      - sh: test -d .
        msg: "未找到 frontend 目录，无法安装前端依赖。"
    cmds:
      - npm install

  default:
    desc: 完整部署流程 (构建前端 -> 编译 -> 上传 -> 重启 -> 清理)
    cmds:
      - task: build-frontend
      - task: compile
      - task: upload
      - task: restart
      - task: clean

  build-frontend:
    desc: 构建前端产物
    dir: frontend
    preconditions:
      - sh: test -d .
        msg: "未找到 frontend 目录，无法执行前端构建。"
    cmds:
      - npm run build

  compile:
    desc: 交叉编译 Go 二进制文件 (Linux amd64)
    env:
      CGO_ENABLED: "0"
      GOOS: "{{.TARGET_OS}}"
      GOARCH: "{{.TARGET_ARCH}}"
    cmds:
      - go build -ldflags "-s -w" -o {{.BINARY_NAME}} .
    generates:
      - "{{.BINARY_NAME}}"

  upload:
    desc: 停止远程服务并上传编译产物
    cmds:
      - echo "[-] 停止远程服务..."
      - ssh {{.SSH_IDENTITY_FLAG}} -p {{.PORT}} -o StrictHostKeyChecking=no {{.SSH_USER}}@{{.SERVER}} "supervisorctl stop {{.SUPERVISOR_PROGRAM}}"
      - ssh {{.SSH_IDENTITY_FLAG}} -p {{.PORT}} -o StrictHostKeyChecking=no {{.SSH_USER}}@{{.SERVER}} "mkdir -p {{.REMOTE_PATH}}"
      - scp {{.SSH_IDENTITY_FLAG}} -P {{.PORT}} -o StrictHostKeyChecking=no {{.BINARY_NAME}} {{.SSH_USER}}@{{.SERVER}}:{{.REMOTE_PATH}}/
      - ssh {{.SSH_IDENTITY_FLAG}} -p {{.PORT}} -o StrictHostKeyChecking=no {{.SSH_USER}}@{{.SERVER}} "chmod +x {{.REMOTE_PATH}}/{{.BINARY_NAME}}"
      - echo "[+] 文件上传成功!"

  restart:
    desc: 启动远程服务
    cmds:
      - echo "[-] 启动远程服务..."
      - ssh {{.SSH_IDENTITY_FLAG}} -p {{.PORT}} -o StrictHostKeyChecking=no {{.SSH_USER}}@{{.SERVER}} "supervisorctl start {{.SUPERVISOR_PROGRAM}}"
      - echo "[+] 远程服务已启动!"

  clean:
    desc: 清理本地构建产物
    cmds:
      - rm -f {{.BINARY_NAME}}

  deploy:
    desc: 完整部署 (全平台通用)
    cmds:
      - task: build-frontend
      - task: compile
      - task: upload
      - task: restart
      - task: clean
