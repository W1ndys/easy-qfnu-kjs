# https://taskfile.dev
version: "3"

vars:
  # 项目名称
  PROJECT_NAME: easy-qfnu-empty-classrooms
  # 目标平台
  TARGET_OS: linux
  TARGET_ARCH: amd64
  # 编译产物名称
  BINARY_NAME: "{{.PROJECT_NAME}}-{{.TARGET_OS}}-{{.TARGET_ARCH}}"
  # 服务器配置
  SERVER: mylinux
  PORT: 22
  SSH_USER: root
  REMOTE_PATH: /root/easy-qfnu-empty-classrooms
  RESTART_CMD: "supervisorctl restart easy-qfnu-empty-classrooms:easy-qfnu-empty-classrooms_00"
  # 手动指定 SSH 密钥路径，留空则自动检测
  IDENTITY_FILE: ""
  # Windows 下可手动指定 Git Bash 路径，留空则自动寻找
  GIT_BASH_PATH: ""
  # 自动检测 SSH 密钥 (shell 动态变量)
  SSH_KEY:
    sh: |
      if [ -n "{{.IDENTITY_FILE}}" ] && [ -f "{{.IDENTITY_FILE}}" ]; then
        echo "{{.IDENTITY_FILE}}"
        exit 0
      fi
      for key in id_ed25519 id_rsa; do
        keypath="$HOME/.ssh/$key"
        if [ -f "$keypath" ]; then
          echo "$keypath"
          exit 0
        fi
      done
      echo "ERROR_NO_SSH_KEY"

tasks:
  default:
    desc: 完整部署流程 (构建前端 -> 编译 -> 上传 -> 重启 -> 清理)
    cmds:
      - task: build-frontend
      - task: compile
      - task: upload
      - task: restart
      - task: clean

  build-frontend:
    desc: 构建前端产物
    dir: frontend
    preconditions:
      - sh: test -d .
        msg: "未找到 frontend 目录，无法执行前端构建。"
    cmds:
      - npm run build

  compile:
    desc: 交叉编译 Go 二进制文件 (Linux amd64)
    env:
      CGO_ENABLED: "0"
      GOOS: "{{.TARGET_OS}}"
      GOARCH: "{{.TARGET_ARCH}}"
    cmds:
      - go build -ldflags "-s -w" -o {{.BINARY_NAME}} .
    generates:
      - "{{.BINARY_NAME}}"

  upload:
    desc: 上传编译产物到服务器
    platforms: [linux, darwin]
    preconditions:
      - sh: '[ "{{.SSH_KEY}}" != "ERROR_NO_SSH_KEY" ]'
        msg: "未找到 SSH 密钥，请通过 IDENTITY_FILE 变量指定。"
    cmds:
      - echo "[-] 使用 SSH 密钥:{{" "}}{{.SSH_KEY}}"
      - ssh -i "{{.SSH_KEY}}" -p {{.PORT}} -o StrictHostKeyChecking=no {{.SSH_USER}}@{{.SERVER}} "mkdir -p {{.REMOTE_PATH}}"
      - tar -c {{.BINARY_NAME}} | ssh -i "{{.SSH_KEY}}" -p {{.PORT}} -o StrictHostKeyChecking=no {{.SSH_USER}}@{{.SERVER}} "tar -x -C {{.REMOTE_PATH}} && chmod +x {{.REMOTE_PATH}}/{{.BINARY_NAME}}"
      - echo "[+] 文件上传成功!"

  upload-windows:
    desc: Windows 下上传编译产物到服务器 (通过 Git Bash)
    platforms: [windows]
    cmds:
      - |
        $ErrorActionPreference = "Stop"

        # 检测 SSH 密钥
        $IdentityFile = "{{.IDENTITY_FILE}}"
        if ([string]::IsNullOrEmpty($IdentityFile)) {
            $sshDir = "$env:USERPROFILE\.ssh"
            foreach ($keyName in @("id_ed25519", "id_rsa")) {
                $path = Join-Path $sshDir $keyName
                if (Test-Path $path) {
                    $IdentityFile = $path
                    Write-Host "[-] 自动检测到 SSH 密钥: $IdentityFile"
                    break
                }
            }
        }
        if ([string]::IsNullOrEmpty($IdentityFile) -or -not (Test-Path $IdentityFile)) {
            Write-Error "未找到 SSH 密钥，请通过 IDENTITY_FILE 变量指定。"
        }

        # 查找 Git Bash
        $bashExe = "{{.GIT_BASH_PATH}}"
        if ([string]::IsNullOrEmpty($bashExe) -or -not (Test-Path $bashExe)) {
            $gitBashPaths = @(
                "$env:ProgramFiles\Git\bin\bash.exe",
                "${env:ProgramFiles(x86)}\Git\bin\bash.exe",
                "$env:LOCALAPPDATA\Programs\Git\bin\bash.exe",
                "$env:ProgramFiles\Git\usr\bin\bash.exe"
            )
            foreach ($path in $gitBashPaths) {
                if (Test-Path $path) {
                    $bashExe = $path
                    break
                }
            }
            if ([string]::IsNullOrEmpty($bashExe) -or -not (Test-Path $bashExe)) {
                $gitCmd = Get-Command git -ErrorAction SilentlyContinue
                if ($gitCmd) {
                    $gitDir = Split-Path (Split-Path $gitCmd.Source -Parent) -Parent
                    $gitBash = Join-Path $gitDir "bin\bash.exe"
                    if (Test-Path $gitBash) { $bashExe = $gitBash }
                }
            }
        }
        if ([string]::IsNullOrEmpty($bashExe) -or -not (Test-Path $bashExe)) {
            Write-Error "未找到 Git Bash，请通过 GIT_BASH_PATH 变量指定或安装 Git for Windows。"
        }
        Write-Host "[-] 使用 Git Bash: $bashExe"

        $unixKey = $IdentityFile -replace '\\', '/' -replace '^([A-Za-z]):', '/$1'
        $bashCmd = "ssh -i '$unixKey' -p {{.PORT}} -o StrictHostKeyChecking=no {{.SSH_USER}}@{{.SERVER}} 'mkdir -p {{.REMOTE_PATH}}' && tar -c {{.BINARY_NAME}} | ssh -i '$unixKey' -p {{.PORT}} -o StrictHostKeyChecking=no {{.SSH_USER}}@{{.SERVER}} 'tar -x -C {{.REMOTE_PATH}} && chmod +x {{.REMOTE_PATH}}/{{.BINARY_NAME}}'"
        & $bashExe -c $bashCmd
        if ($LASTEXITCODE -ne 0) { Write-Error "文件上传失败。" }
        Write-Host "[+] 文件上传成功!"

  restart:
    desc: 远程重启服务
    platforms: [linux, darwin]
    preconditions:
      - sh: '[ "{{.SSH_KEY}}" != "ERROR_NO_SSH_KEY" ]'
        msg: "未找到 SSH 密钥，请通过 IDENTITY_FILE 变量指定。"
    cmds:
      - echo "[-] 正在执行远程命令:{{" "}}{{.RESTART_CMD}}"
      - ssh -i "{{.SSH_KEY}}" -p {{.PORT}} -o StrictHostKeyChecking=no {{.SSH_USER}}@{{.SERVER}} "{{.RESTART_CMD}}"
      - echo "[+] 远程命令执行成功!"

  restart-windows:
    desc: Windows 下远程重启服务
    platforms: [windows]
    cmds:
      - |
        $ErrorActionPreference = "Stop"
        $IdentityFile = "{{.IDENTITY_FILE}}"
        if ([string]::IsNullOrEmpty($IdentityFile)) {
            $sshDir = "$env:USERPROFILE\.ssh"
            foreach ($keyName in @("id_ed25519", "id_rsa")) {
                $path = Join-Path $sshDir $keyName
                if (Test-Path $path) { $IdentityFile = $path; break }
            }
        }
        if ([string]::IsNullOrEmpty($IdentityFile) -or -not (Test-Path $IdentityFile)) {
            Write-Error "未找到 SSH 密钥，请通过 IDENTITY_FILE 变量指定。"
        }
        Write-Host "[-] 正在执行远程命令: {{.RESTART_CMD}}"
        ssh -i $IdentityFile -p {{.PORT}} -o StrictHostKeyChecking=no {{.SSH_USER}}@{{.SERVER}} "{{.RESTART_CMD}}"
        Write-Host "[+] 远程命令执行成功!"

  clean:
    desc: 清理本地构建产物
    cmds:
      - rm -f {{.BINARY_NAME}}
    platforms: [linux, darwin]

  clean-windows:
    desc: Windows 下清理本地构建产物
    platforms: [windows]
    cmds:
      - powershell -Command "Remove-Item -Force -ErrorAction SilentlyContinue '{{.BINARY_NAME}}'"

  deploy:
    desc: 完整部署 (自动适配平台)
    cmds:
      - task: build-frontend
      - task: compile
      - task: deploy-upload
      - task: deploy-restart
      - task: deploy-clean

  deploy-upload:
    internal: true
    cmds:
      - task: upload
        platforms: [linux, darwin]
      - task: upload-windows
        platforms: [windows]

  deploy-restart:
    internal: true
    cmds:
      - task: restart
        platforms: [linux, darwin]
      - task: restart-windows
        platforms: [windows]

  deploy-clean:
    internal: true
    cmds:
      - task: clean
        platforms: [linux, darwin]
      - task: clean-windows
        platforms: [windows]
