# https://taskfile.dev
version: "3"

vars:
  COMPOSE: docker compose

tasks:
  default:
    desc: 显示 Docker 部署说明
    cmds:
      - printf "请使用 Docker 部署流程。\n"
      - printf "常用命令：\n"
      - printf "  task up      # 构建并启动前后端容器\n"
      - printf "  task down    # 停止并移除容器\n"
      - printf "  task logs    # 查看容器日志\n"
      - printf "  task build   # 重新构建镜像\n"

  install:
    desc: 安装本地开发依赖
    cmds:
      - task: install-go
      - task: install-frontend

  install-go:
    desc: 安装 Go 依赖
    cmds:
      - go mod download

  install-frontend:
    desc: 安装前端依赖
    dir: frontend
    cmds:
      - npm install

  build:
    desc: 构建前后端 Docker 镜像
    cmds:
      - '{{.COMPOSE}} build'

  up:
    desc: 构建并启动前后端容器
    cmds:
      - '{{.COMPOSE}} up -d --build'

  down:
    desc: 停止并移除容器
    cmds:
      - '{{.COMPOSE}} down'

  logs:
    desc: 查看容器日志
    cmds:
      - '{{.COMPOSE}} logs --tail=200'

  ps:
    desc: 查看容器状态
    cmds:
      - '{{.COMPOSE}} ps'

  restart:
    desc: 重启容器
    cmds:
      - '{{.COMPOSE}} restart'

  frontend-dev:
    desc: 启动前端本地开发服务器
    dir: frontend
    cmds:
      - npm run dev

  backend-dev:
    desc: 启动后端本地开发服务
    cmds:
      - go run .
