version: "3.8"

services:
  empty-classroom:
    build: .
    container_name: easy-qfnu-kjs
    restart: always
    env_file: .env
    networks:
      - traefik-public
      - app-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.empty-classroom.rule=Host(`kjs.w1ndys.top`)"
      - "traefik.http.routers.empty-classroom.entrypoints=websecure"
      - "traefik.http.routers.empty-classroom.tls.certresolver=leresolver"
      - "traefik.http.services.empty-classroom.loadbalancer.server.port=8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  traefik-public:
    external: true
  app-net:
    driver: bridge
