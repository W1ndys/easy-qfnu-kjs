services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easy-qfnu-kjs-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - traefik-public
      - app-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.easy-qfnu-kjs.rule=Host(`kjs.w1ndys.top`)"
      - "traefik.http.routers.easy-qfnu-kjs.entrypoints=websecure"
      - "traefik.http.routers.easy-qfnu-kjs.tls.certresolver=leresolver"
      - "traefik.http.services.easy-qfnu-kjs.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easy-qfnu-kjs-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8080
      GIN_MODE: release
    networks:
      - app-net
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  traefik-public:
    external: true
  app-net:
    driver: bridge
